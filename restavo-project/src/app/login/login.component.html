<form class="container">
  <div class="form-group">
    <input
      type="text"
      class="form-control"
      id="exampleInputEmail1"
      aria-describedby="emailHelp"
      placeholder="Ad-Soyad"
      required
    />
  </div>
  <div class="form-group">
    <input
      type="tel"
      class="form-control"
      id="exampleInputPassword1"
      placeholder="Telefon"
      maxlength="12"
      required
      oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');" 
    />
  </div>
  <div class="form-group">
    <input
      type="email"
      class="form-control"
      id="exampleInputEmail1"
      aria-describedby="emailHelp"
      placeholder="Email"
      required
    />
  </div>
  <div class="form-group">
    <input
      type="password"
      class="form-control"
      id="exampleInputPassword1"
      placeholder="Password"
      required
    />
  </div>

  <button type="submit" class="btn btn-primary" routerLink="/" >Submit</button>
</form>
